# $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
gui:
  nerdFontsVersion: "3"
  tabWidth: 2
  portraitModeAutoMaxWidth: 120
  mouseEvents: false
  # expandFocusedSidePanel: true
os:
  editPreset: nvim-remote
  # edit: '{ [ -z "$NVIM" ] && nvim -- {{filename}}; } || { nvim --server "$NVIM" --remote-send "<C-x>" && nvim --server "$NVIM" --remote {{filename}}; }'
  # editAtLine: '{ [ -z "$NVIM" ] && nvim +{{line}} -- {{filename}}; } || { nvim --server "$NVIM" --remote-send "<C-x>" && nvim --server "$NVIM" --remote {{filename}} && nvim --server "$NVIM" --remote-send ":{{line}}<CR>"; }'
  # editAtLineAndWait: "nvim +{{line}} {{filename}}"
  # openDirInEditor: '{ [ -z "$NVIM" ] && nvim -- {{dir}}; } || { nvim --server "$NVIM" --remote-send "<C-x>" && nvim --server "$NVIM" --remote-tab {{dir}}; }'
  # editInTerminal: false
customCommands:
  - key: "<c-h>"
    context: "files"
    description: "hunk diff"
    output: terminal
    prompts:
      - type: "menu"
        title: "Run hunk diff on..."
        key: "Scope"
        options:
          - name: "All files"
            value: ""
          - name: "Only staged"
            value: " --staged"
    command: "hunk diff{{.Form.Scope}}"
  - key: "<c-h>"
    context: "commits"
    description: "hunk show commit"
    output: terminal
    command: "git show -m {{.SelectedLocalCommit.Hash}} | hunk patch"
  - key: "<c-h>"
    context: "subCommits"
    description: "hunk show commit"
    output: terminal
    command: "git show -m {{.SelectedSubCommit.Hash}} | hunk patch"
  - key: "<c-h>"
    context: "reflogCommits"
    description: "hunk show commit"
    output: terminal
    command: "git show -m {{.SelectedReflogCommit.Hash}} | hunk patch"
  - key: "<c-h>"
    context: "stash"
    description: "hunk stash show"
    output: terminal
    command: "hunk stash show {{.SelectedStashEntry.RefName}}"
git:
  mainBranches:
    - main
    - release/*
  pagers:
    - externalDiffCommand: difft --color=always --syntax-highlight=on --tab-width=2
    - pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
