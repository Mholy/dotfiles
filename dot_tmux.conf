set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"
set-option -g set-clipboard on
set-option -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-256color:RGB:clipboard,xterm-ghostty:RGB:clipboard,tmux-256color:RGB:clipboard"
set-option -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# Start windows and panes at 1 instead of 0.
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Faster escape timing for vim/neovim.
set-option -sg escape-time 10

# Larger scrollback history.
set-option -g history-limit 100000

# Easier splits: prefix | and prefix -.
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Keep new windows/panes in the current directory.
bind-key c new-window -c "#{pane_current_path}"

# Vim-style pane navigation.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim-style pane resizing.
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Reload config quickly.
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# More readable status line.
set-option -g status-position bottom
set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-right-length 100
set-option -g status-left "#[bold]#S #[default]"
set-option -g status-right "#[fg=colour244]%Y-%m-%d %H:%M"
set-option -g window-status-current-style "bold"

# Use vi keys in copy mode.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
